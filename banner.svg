    .arrow { fill: #58a6ff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 500; }
    .body { fill: #9198a1; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 15px; }
    .section-label { fill: #6e7681; font-size: 11px; letter-spacing: 0.5px; }
    .row-label { fill: #6e7681; font-size: 11px; }
    .edu-text { fill: #9198a1; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 14px; }
    .edu-strong { fill: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 14px; }
    .edu-mono { fill: #6e7681; font-size: 12px; }
    .pill { fill: none; stroke: #30363d; stroke-width: 1; }
    .pill-text { fill: #9198a1; font-size: 12px; }
    .card { fill: #0d1117; stroke: #30363d; stroke-width: 1; }
    .card-title { fill: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; }
    .card-desc { fill: #9198a1; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 12px; }
    .elsewhere-label { fill: #6e7681; font-size: 12px; }
    .elsewhere-link { fill: #9198a1; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 13px; }
