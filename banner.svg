  <!-- HEADER -->
  <text x="32" y="58" class="h1">hey, i&apos;m kalyan</text>
  <text x="218" y="58" class="arrow">→</text>

  <!-- bio -->
  <text x="32" y="92" class="body">backend &amp; ml engineer driven by building projects and products that solve</text>
  <text x="32" y="116" class="body">real-world problems. whether it&apos;s architecting a distributed key-value store from</text>
  <text x="32" y="140" class="body">scratch or automating my entire macos workflow, i focus on building systems that</text>
  <text x="32" y="164" class="body">simplify complexity and actually help people work better.</text>

